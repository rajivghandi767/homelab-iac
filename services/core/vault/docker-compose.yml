services:
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.scope=global"
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_ADDR=http://127.0.0.1:8200
      - SKIP_CHOWN=true
      - SKIP_SETCAP=true
    command: server
    volumes:
      - ./config:/vault/config:ro
      - vault_data:/vault/data
      - vault_logs:/vault/logs
      - vault_file:/vault/file
    networks:
      - core
      - monitoring
    healthcheck:
      # Query the native API and accept 'sealed' as a healthy state
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider 'http://127.0.0.1:8200/v1/sys/health?sealedcode=200&uninitcode=200' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  vault_data:
    external: true
    name: vault_data
  vault_logs:
    name: vault_logs
  vault_file:
    name: vault_file

networks:
  core:
    external: true
  monitoring:
    external: true
