---
- name: Provision Homelab Foundation
  hosts: all
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install essential dependencies
      apt:
        pkg:
          - curl
          - rsync           
          - python3-docker 
        state: present

    - name: Ensure Docker networks exist safely
      community.docker.docker_network:
        name: "{{ item }}"
        state: present
      loop:
        - core
        - database
        - monitoring
        - media

    - name: Enforce Docker log rotation policy
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "data-root": "/mnt/dockerdata",
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
      notify: Restart Docker

    - name: Schedule automated volume backups
      cron:
        name: "Homelab Volume Backup"
        minute: "0"
        hour: "0"
        # weekday: "1"
        job: "/opt/homelab-iac/scripts/backup_volumes.sh >> /var/log/homelab_backup.log 2>&1"
        user: root

    - name: Ensure secure global secrets directory exists
      ansible.builtin.file:
        path: /opt/homelab-iac/secrets
        state: directory
        mode: '0700'
        owner: root

    - name: Generate Global Scripts Environment File
      template:
        src: templates/global_secrets.env.j2
        dest: /opt/homelab-iac/secrets/.env
        mode: '0600'
        owner: root

    - name: Sync service configurations from Control Node
      ansible.posix.synchronize:
        src: ../services/
        dest: /opt/homelab-iac/services/
        rsync_opts:
          - "--exclude=data/"
          - "--exclude=apps/"
          - "--exclude=.git/"
          - "--exclude=*.example"

    - name: Generate Prometheus Vault Token
      template:
        src: templates/vault_token.j2
        dest: /opt/homelab-iac/services/monitoring/prometheus/vault_token
        mode: '0600'
        owner: root
    
    - name: Sync scripts directory from Control Node
      ansible.posix.synchronize:
        src: ../scripts/
        dest: /opt/homelab-iac/scripts/
        
    - name: Ensure backup script is executable
      ansible.builtin.file:
        path: /opt/homelab-iac/scripts/backup_volumes.sh
        mode: '0755'
        owner: root
      
    - name: Ensure Apps directory exists with Jenkins ownership
      ansible.builtin.file:
        path: /opt/homelab-iac/services/apps
        state: directory
        owner: dietpi
        group: dietpi
        recurse: yes

    - name: Configure logrotate for homelab backup log
      copy:
        dest: /etc/logrotate.d/homelab_backup
        content: |
          /var/log/homelab_backup.log {
              weekly
              rotate 2
              compress
              delaycompress
              missingok
              notifempty
              create 0644 root root
          }

  handlers:
    - name: Restart Docker
      service:
        name: docker
        state: restarted