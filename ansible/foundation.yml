---
- name: Provision Homelab Foundation
  hosts: all
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install essential dependencies
      apt:
        pkg:
          - curl
          - rsync           # Required for Ansible synchronize module
          - python3-docker  # Required for Ansible docker_network module
        state: present

    - name: Ensure Docker networks exist safely
      community.docker.docker_network:
        name: "{{ item }}"
        state: present
      loop:
        - core
        - database
        - monitoring
        - media
        - portfolio
        - trivia
        - prop-ferry
        - svt

    - name: Enforce Docker log rotation policy
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
      notify: Restart Docker

    - name: Schedule automated volume backups
      cron:
        name: "Homelab Volume Backup"
        minute: "0"
        hour: "5"
        job: "/opt/homelab-iac/scripts/backup_volumes.sh >> /var/log/homelab_backup.log 2>&1"
        user: root

    - name: Sync service configurations from Control Node
      ansible.posix.synchronize:
        src: ../services/
        dest: /opt/homelab-iac/services/
        rsync_opts:
          - "--exclude=data/"
          - "--exclude=.git/"
          - "--exclude=*.example"

  handlers:
    - name: Restart Docker
      service:
        name: docker
        state: restarted