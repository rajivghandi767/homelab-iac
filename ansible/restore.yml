---
- name: Layer 2 - Zero-Trust Restore Data Strategies
  hosts: metal
  become: yes
  vars_files:
    - group_vars/all/secrets.yml

  vars:
    local_staging_dir: "/tmp/homelab_backups_staging"
    remote_backup_dir: "/opt/homelab-iac/backups/downloads"
    restore_map:
      - { file: "jenkins", volume: "jenkins_data", type: "volume" }
      - { file: "vault_data", volume: "vault_data", type: "volume" }
      - { file: "npm_data", volume: "npm_data", type: "volume" }
      - { file: "npm_letsencrypt", volume: "npm_letsencrypt", type: "volume" }
      - { file: "pihole_config", volume: "pihole_config", type: "volume" }
      - { file: "pihole_dnsmasq", volume: "pihole_dnsmasq", type: "volume" }
      - { file: "portainer_data", volume: "portainer_data", type: "volume" }
      - { file: "unifi_db_data", volume: "unifi_db_data", type: "volume" }
      - { file: "unifi_config", volume: "unifi_config", type: "volume" }
      - { file: "pgadmin_data", volume: "pgadmin_data", type: "volume" }
      - { file: "grafana_data", volume: "grafana_data", type: "volume" }
      - { file: "jellyfin_config", volume: "jellyfin_config", type: "volume" }
      - { file: "postgres_logical", volume: "none", type: "sql" }

  pre_tasks:
    - name: Ensure secure local staging directory exists on Control Node
      delegate_to: localhost
      become: no
      file:
        path: "{{ local_staging_dir }}"
        state: directory
        mode: '0700'

  tasks:
    - name: Secure Retrieval and Decryption (Executed on Control Node)
      delegate_to: localhost
      become: no
      block:
        - name: Download Encrypted Backups from GCS
          google.cloud.gcp_storage_object:
            action: download
            bucket: "{{ gcs_bucket_name }}"
            src: "latest/{{ item.file }}.tar.gz.gpg"
            dest: "{{ local_staging_dir }}/{{ item.file }}.tar.gz.gpg"
            project: "{{ gcp_project_id }}"
            auth_kind: serviceaccount
            service_account_file: "../secrets/gcp-credentials.json" 
          loop: "{{ restore_map }}"

        - name: Decrypt Backups Locally
          shell: |
            gpg --batch --yes --passphrase "{{ backup_encryption_passphrase }}" \
            -o {{ local_staging_dir }}/{{ item.file }}.tar.gz \
            -d {{ local_staging_dir }}/{{ item.file }}.tar.gz.gpg
          loop: "{{ restore_map }}"
          no_log: true 

    - name: Ensure remote download directory exists
      file:
        path: "{{ remote_backup_dir }}"
        state: directory
        mode: '0755'

    - name: Push Decrypted Archives to the Pi over SSH
      copy:
        src: "{{ local_staging_dir }}/{{ item.file }}.tar.gz"
        dest: "{{ remote_backup_dir }}/{{ item.file }}.tar.gz"
        mode: '0600'
      loop: "{{ restore_map }}"

    - name: Inject Data into Docker Volumes
      shell: |
        docker volume create {{ item.volume }}
        docker run --rm \
          -v {{ item.volume }}:/target \
          -v {{ remote_backup_dir }}:/backup \
          alpine tar -xzf /backup/{{ item.file }}.tar.gz -C /target
      loop: "{{ restore_map }}"
      when: item.type == 'volume'

    - name: Clean up remote archives on the Pi
      file:
        path: "{{ remote_backup_dir }}/{{ item.file }}.tar.gz"
        state: absent
      loop: "{{ restore_map }}"

  post_tasks:
    - name: Secure Cleanup on Control Node (Shred data)
      delegate_to: localhost
      become: no
      file:
        path: "{{ local_staging_dir }}"
        state: absent